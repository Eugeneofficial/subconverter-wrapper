<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubConverter Wrapper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f23;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.container{max-width:820px;width:100%;padding:30px 20px}
h1{text-align:center;font-size:2rem;margin-bottom:6px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#666;margin-bottom:24px;font-size:.85rem}
.card{background:#1a1a2e;border-radius:14px;padding:22px;margin-bottom:16px;border:1px solid #2a2a4a}
.card h2{font-size:1rem;margin-bottom:14px;color:#a0a0d0;display:flex;align-items:center;gap:8px}
label{display:block;margin-bottom:5px;font-size:.82rem;color:#777}
textarea{width:100%;padding:12px;background:#0f0f23;border:1px solid #3a3a5a;border-radius:10px;color:#e0e0e0;font-size:.9rem;outline:none;resize:vertical;font-family:inherit;min-height:80px;transition:border-color .2s}
textarea:focus{border-color:#667eea}
input[type="text"]{width:100%;padding:10px 14px;background:#0f0f23;border:1px solid #3a3a5a;border-radius:10px;color:#e0e0e0;font-size:.9rem;outline:none;transition:border-color .2s}
input[type="text"]:focus{border-color:#667eea}
select{width:100%;padding:10px 14px;background:#0f0f23;border:1px solid #3a3a5a;border-radius:10px;color:#e0e0e0;font-size:.9rem;outline:none;cursor:pointer}
select:focus{border-color:#667eea}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 22px;border:none;border-radius:10px;font-size:.9rem;cursor:pointer;transition:all .2s;font-weight:600}
.btn-go{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;width:100%}
.btn-go:hover{opacity:.9;transform:translateY(-1px)}
.btn-sm{background:#2a2a4a;color:#c0c0e0;padding:6px 12px;font-size:.75rem}
.btn-sm:hover{background:#3a3a5a}
.btn-copy{background:#667eea;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:.72rem;cursor:pointer;position:absolute;top:8px;right:8px}
.btn-copy:hover{background:#5a6fd6}
.result{background:#0f0f23;border:1px solid #3a3a5a;border-radius:10px;padding:14px;margin-top:14px;word-break:break-all;font-family:Consolas,'Courier New',monospace;font-size:.82rem;color:#a0d0a0;display:none;position:relative}
.ready-box{background:#0f0f23;border:2px solid #667eea;border-radius:14px;padding:20px;margin-top:14px;text-align:center;display:none}
.ready-box .label{color:#888;font-size:.82rem;margin-bottom:10px}
.ready-box .url{font-family:Consolas,monospace;font-size:.78rem;color:#a0d0a0;word-break:break-all;margin-bottom:14px;padding:10px;background:#1a1a2e;border-radius:8px}
.btn-big{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:1rem;cursor:pointer;font-weight:700;width:100%;transition:all .2s}
.btn-big:hover{opacity:.9;transform:translateY(-1px)}
.btn-big.done{background:#10b981}
.preview{max-height:350px;overflow-y:auto;background:#0f0f23;border:1px solid #3a3a5a;border-radius:10px;padding:14px;margin-top:14px;font-family:Consolas,monospace;font-size:.78rem;line-height:1.5;display:none}
.preview pre{white-space:pre-wrap}
.badge{background:#667eea;color:#fff;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);padding:10px 20px;border-radius:10px;font-size:.85rem;transition:transform .3s;z-index:1000;color:#fff}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:#10b981}
.toast.err{background:#ef4444}
.dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
.dot.ok{background:#10b981}
.dot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.status{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:.82rem;color:#888}
.row{display:flex;gap:10px;margin-bottom:14px}
.row>*{flex:1}
.chk{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#0f0f23;border:1px solid #3a3a5a;border-radius:8px;cursor:pointer;transition:all .2s;font-size:.82rem;user-select:none}
.chk:hover{border-color:#667eea}
.chk input{accent-color:#667eea;cursor:pointer}
.chk.active{border-color:#667eea;background:#1a1a3e}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.collapsible{cursor:pointer;user-select:none}
.collapsible::after{content:' ▸';font-size:.7rem;color:#666}
.collapsible.open::after{content:' ▾'}
.collapsible+.coll-content{max-height:0;overflow:hidden;transition:max-height .3s}
.collapsible.open+.coll-content{max-height:200px}
.gh-badge{display:inline-flex;align-items:center;gap:6px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:6px 12px;font-size:.82rem;color:#888;text-decoration:none;margin-bottom:20px}
.gh-badge:hover{border-color:#667eea;color:#aaa}
</style>
</head>
<body>
<div class="container">
    <h1>SubConverter Wrapper</h1>
    <p class="sub">VLESS / VMess / SS / SSR / Trojan</p>

    <a class="gh-badge" href="https://github.com/Eugeneofficial/subconverter-wrapper" target="_blank">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
    </a>

    <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Checking backend...</span>
    </div>

    <div class="card">
        <h2 class="collapsible" onclick="this.classList.toggle('open')">Settings</h2>
        <div class="coll-content" style="overflow:visible">
            <label>Backend URL (Cloudflare Worker)</label>
            <input type="text" id="backendUrl" placeholder="https://your-worker.workers.dev">
            <button class="btn btn-sm" onclick="testBackend()" style="margin-top:8px">Test Connection</button>
        </div>
    </div>

    <div class="card">
        <h2>Subscriptions</h2>

        <label>Preset sources</label>
        <div class="preset-grid">
            <label class="chk"><input type="checkbox" class="preset-cb" value="BLACK_VLESS_RUS.txt"> BLACK VLESS</label>
            <label class="chk"><input type="checkbox" class="preset-cb" value="BLACK_VMESS_RUS.txt"> BLACK VMess</label>
            <label class="chk"><input type="checkbox" class="preset-cb" value="BLACK_TROJAN_RUS.txt"> BLACK Trojan</label>
            <label class="chk"><input type="checkbox" class="preset-cb" value="BLACK_SS%2BAll_RUS.txt"> BLACK SS+All</label>
        </div>

        <label>Custom URLs (one per line)</label>
        <textarea id="urls" placeholder="https://example.com/sub1.txt&#10;https://example.com/sub2.txt"></textarea>

        <div class="row" style="margin-top:14px">
            <div>
                <label>Target</label>
                <select id="target">
                    <option value="clash">Clash</option>
                    <option value="clashr">ClashR</option>
                    <option value="surge&ver=4">Surge 4</option>
                    <option value="quanx">Quantumult X</option>
                    <option value="loon">Loon</option>
                    <option value="surfboard">Surfboard</option>
                    <option value="v2ray">V2Ray</option>
                </select>
            </div>
        </div>

        <button class="btn btn-go" onclick="generate()" style="margin-top:6px">Generate</button>

        <div class="result" id="resultBox">
            <button class="btn-copy" onclick="copyResult()">Copy</button>
            <div id="resultUrl"></div>
        </div>

        <div class="ready-box" id="readyBox">
            <div class="label">Paste this into Clash Verge Rev:</div>
            <div class="url" id="readyUrl"></div>
            <button class="btn-big" id="bigCopy" onclick="copyResult();this.textContent='Copied!';this.classList.add('done');setTimeout(()=>{this.textContent='Copy to Clipboard';this.classList.remove('done')},2000)">Copy to Clipboard</button>
        </div>
    </div>

    <div class="card" id="previewCard" style="display:none">
        <h2>
            Preview
            <span class="badge" id="proxyCount">0</span>
            <span style="flex:1"></span>
            <button class="btn btn-sm" onclick="downloadConfig()">Download</button>
            <button class="btn btn-sm" onclick="copyConfig()">Copy</button>
        </h2>
        <div class="preview" id="previewBox">
            <pre id="previewContent"></pre>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/';
let generatedUrl = '';

// Preset checkboxes
document.querySelectorAll('.preset-cb').forEach(cb => {
    cb.addEventListener('change', () => cb.parentElement.classList.toggle('active', cb.checked));
});

// Default backend URL
const DEFAULT_BACKEND = 'https://subconverter-wrapper.abramovplay.workers.dev';

// Load saved backend URL
const savedBackend = localStorage.getItem('backendUrl');
document.getElementById('backendUrl').value = savedBackend || DEFAULT_BACKEND;

function getBackend() {
    let url = document.getElementById('backendUrl').value.trim().replace(/\/+$/, '');
    if (!url || !url.startsWith('http')) url = DEFAULT_BACKEND;
    localStorage.setItem('backendUrl', url);
    return url;
}

function getAllUrls() {
    const urls = [];
    document.querySelectorAll('.preset-cb:checked').forEach(cb => urls.push(BASE + cb.value));
    document.getElementById('urls').value.trim().split('\n').forEach(u => { u = u.trim(); if (u) urls.push(u); });
    return urls;
}

async function testBackend() {
    const backend = getBackend();
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    text.textContent = 'Testing...';
    dot.className = 'dot';
    try {
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 15000);
        const resp = await fetch(backend + '/health', { signal: controller.signal });
        const data = await resp.json();
        if (data.status === 'ok') {
            text.textContent = 'Backend connected!';
            dot.className = 'dot ok';
            toast('Connection OK!');
        }
    } catch (e) {
        text.textContent = 'Failed: ' + e.message;
        dot.className = 'dot err';
        toast('Connection failed!', 1);
    }
}

function generate() {
    const backend = getBackend();
    if (!backend) { toast('Set backend URL first!', 1); return; }
    const urls = getAllUrls();
    if (!urls.length) { toast('Add at least one subscription!', 1); return; }
    const target = document.getElementById('target').value;
    const params = new URLSearchParams();
    params.set('target', target);
    params.set('url', urls.join('|'));
    generatedUrl = backend + '/sub?' + params.toString();
    const fullUrl = generatedUrl;
    document.getElementById('resultUrl').textContent = fullUrl;
    document.getElementById('resultBox').style.display = 'block';
    document.getElementById('readyUrl').textContent = fullUrl;
    document.getElementById('readyBox').style.display = 'block';
    fetchPreview(generatedUrl);
}

async function fetchPreview(url) {
    const card = document.getElementById('previewCard');
    const box = document.getElementById('previewBox');
    const content = document.getElementById('previewContent');
    const countEl = document.getElementById('proxyCount');
    card.style.display = 'block';
    box.style.display = 'block';
    content.textContent = 'Loading...';
    countEl.textContent = '...';
    try {
        const resp = await fetch(url);
        const text = await resp.text();
        content.textContent = text.substring(0, 8000);
        if (text.length > 8000) content.textContent += '\n\n... truncated';
        const m = text.match(/type:\s*(vless|vmess|ss|ssr|trojan|snell|hysteria|tuic|anytls)/gi);
        countEl.textContent = (m ? m.length : 0) + ' nodes';
    } catch (e) {
        content.textContent = 'Error: ' + e.message;
        countEl.textContent = 'error';
    }
}

function copyResult() {
    navigator.clipboard.writeText(generatedUrl);
    toast('URL copied!');
}

function copyConfig() {
    navigator.clipboard.writeText(document.getElementById('previewContent').textContent);
    toast('Config copied!');
}

function downloadConfig() {
    const text = document.getElementById('previewContent').textContent;
    const blob = new Blob([text], { type: 'text/yaml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'clash-config.yaml';
    a.click();
    toast('Downloaded!');
}

function toast(msg, err) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + (err ? 'err' : 'ok');
    setTimeout(() => t.className = 'toast', 2000);
}

// Auto-check BLACK VLESS and generate on load
window.addEventListener('DOMContentLoaded', () => {
    const cb = document.querySelector('.preset-cb[value="BLACK_VLESS_RUS.txt"]');
    if (cb) { cb.checked = true; cb.parentElement.classList.add('active'); }

    // Auto-generate if backend is set
    if (getBackend()) generate();
});

// Check backend status
(async function checkStatus() {
    const backend = getBackend();
    if (!backend) {
        document.getElementById('statusText').textContent = 'Set backend URL above';
        document.getElementById('statusDot').className = 'dot err';
        return;
    }
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        const resp = await fetch(backend + '/health', { signal: controller.signal });
        clearTimeout(timeoutId);
        const data = await resp.json();
        if (data.status === 'ok') {
            document.getElementById('statusText').textContent = 'Backend connected';
            document.getElementById('statusDot').className = 'dot ok';
        }
    } catch (e) {
        document.getElementById('statusText').textContent = 'Backend unreachable (click Generate to try anyway)';
        document.getElementById('statusDot').className = 'dot err';
    }
})();
</script>
</body>
</html>
